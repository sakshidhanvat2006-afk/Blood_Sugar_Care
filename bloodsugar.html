<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blood Sugar Record</title>
<link rel="stylesheet" href="style2.css">
</head>
<body>
<div class="container">
<h2>Blood Sugar Record</h2>

<form>
<label>Date</label><br>
<input type="date"><br><br>

<label>Time</label><br>
<input type="time"><br><br>

<label>Blood Sugar (mg/dL)</label><br>
<input type="number" placeholder="Enter Blood Sugar"><br><br>

<label>Notes</label><br>
<textarea rows="4"></textarea><br><br>

<button type="submit">Save Record</button>
</form>
</div>
</body>
</html>
